<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowAI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#06090f; --surface:#0c1018; --surface2:#111822; --border:#1a2740;
  --accent:#00c8ff; --accent2:#6c4fff; --green:#00e5a0; --red:#ff4560;
  --text:#ddeeff; --muted:#4a6080; --fh:'Syne',sans-serif; --fm:'Space Mono',monospace;
}
body { background:var(--bg); color:var(--text); font-family:var(--fm); min-height:100vh; display:flex; align-items:center; justify-content:center; }
body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(0,200,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.025) 1px,transparent 1px); background-size:48px 48px; pointer-events:none; z-index:0; }
.orb { position:fixed; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle,rgba(0,200,255,0.05) 0%,transparent 70%); top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
.card { position:relative; z-index:1; width:100%; max-width:420px; margin:20px; background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:44px; display:flex; flex-direction:column; gap:22px; box-shadow:0 0 60px rgba(0,200,255,0.05),0 32px 64px rgba(0,0,0,0.4); animation:fadeUp 0.5s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.logo { font-family:var(--fh); font-size:26px; font-weight:800; display:flex; align-items:center; gap:12px; }
.logo-icon { width:40px; height:40px; border-radius:11px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 0 20px rgba(0,200,255,0.25); }
.logo span { color:var(--accent); }
.tagline { font-size:12px; color:var(--muted); line-height:1.65; }
.tabs { display:flex; border:1px solid var(--border); border-radius:12px; overflow:hidden; background:var(--surface2); }
.tab { flex:1; padding:11px; text-align:center; font-family:var(--fm); font-size:11px; cursor:pointer; border:none; background:transparent; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; transition:all 0.25s; }
.tab.active { background:var(--surface); color:var(--accent); }
.field { display:flex; flex-direction:column; gap:7px; }
.field label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.field input { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:13px 16px; font-family:var(--fm); font-size:13px; color:var(--text); outline:none; transition:border-color 0.2s,box-shadow 0.2s; width:100%; }
.field input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,200,255,0.08); }
.field input::placeholder { color:var(--muted); }
.submit-btn { padding:15px; border-radius:12px; border:none; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#06090f; font-family:var(--fh); font-size:15px; font-weight:800; cursor:pointer; transition:all 0.2s; }
.submit-btn:hover { filter:brightness(1.08); transform:translateY(-1px); }
.submit-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; filter:none; }
.divider { text-align:center; font-size:10px; color:var(--muted); position:relative; letter-spacing:1px; }
.divider::before,.divider::after { content:''; position:absolute; top:50%; width:38%; height:1px; background:var(--border); }
.divider::before { left:0; } .divider::after { right:0; }
.google-btn { padding:13px; border-radius:12px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-family:var(--fm); font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:all 0.2s; width:100%; }
.google-btn:hover { border-color:rgba(0,200,255,0.4); background:rgba(0,200,255,0.04); }
.error-msg { font-size:11px; color:var(--red); text-align:center; min-height:16px; }
.back-link { text-align:center; font-size:11px; color:var(--muted); }
.back-link a { color:var(--accent); text-decoration:none; }
.back-link a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="card">
  <div class="logo"><div class="logo-icon">⚡</div>Flow<span>AI</span></div>
  <p class="tagline">AI-powered workflow automation builder.<br>Sign in to save and manage your workflows.</p>
  <div class="tabs">
    <button class="tab active" id="loginTab" onclick="switchTab('login')">Login</button>
    <button class="tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
  </div>
  <div class="field" id="nameField" style="display:none">
    <label>Display Name</label>
    <input type="text" id="nameInput" placeholder="Your name" autocomplete="name"/>
  </div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="passInput" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()"/>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <button class="submit-btn" id="submitBtn" onclick="doAuth()">Login</button>
  <div class="divider">or continue with</div>
  <button class="google-btn" onclick="doGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.01c-.72.48-1.63.77-2.7.77-2.08 0-3.84-1.4-4.47-3.29H1.86v2.08A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.51 10.53c-.16-.48-.25-.99-.25-1.53s.09-1.05.25-1.53V5.39H1.86A8 8 0 0 0 .98 9c0 1.29.31 2.51.88 3.61l2.65-2.08z"/><path fill="#EA4335" d="M8.98 3.58c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 8.98 1a8 8 0 0 0-7.12 4.39l2.65 2.08c.63-1.89 2.39-3.29 4.47-3.29z"/></svg>
    Continue with Google
  </button>
  <div class="back-link"><a href="index.html">← Back to Home</a></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const app = initializeApp({
  apiKey: "AIzaSyA6mD9wjzCpqZps20CnxZUmPoCUC_yBXCA",
  authDomain: "flowai-455e3.firebaseapp.com",
  projectId: "flowai-455e3",
  storageBucket: "flowai-455e3.firebasestorage.app",
  messagingSenderId: "575960248970",
  appId: "1:575960248970:web:636bf5b1c5c4e15b69f373"
});
const auth = getAuth(app);
const gProvider = new GoogleAuthProvider();
let mode = 'login';

// Check URL param for signup mode
if (new URLSearchParams(location.search).get('mode') === 'signup') {
  switchTab('signup');
}

// Redirect if already logged in
onAuthStateChanged(auth, user => {
  if (user) window.location.href = 'dashboard.html';
});

window.switchTab = (tab) => {
  mode = tab;
  document.getElementById('loginTab').classList.toggle('active', tab === 'login');
  document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
  document.getElementById('submitBtn').textContent = tab === 'login' ? 'Login' : 'Create Account';
  document.getElementById('nameField').style.display = tab === 'signup' ? 'flex' : 'none';
  document.getElementById('errorMsg').textContent = '';
  document.getElementById('passInput').setAttribute('autocomplete', tab === 'login' ? 'current-password' : 'new-password');
};

window.doAuth = async () => {
  const email = document.getElementById('emailInput').value.trim();
  const pass = document.getElementById('passInput').value;
  const name = document.getElementById('nameInput').value.trim();
  const errEl = document.getElementById('errorMsg');
  const btn = document.getElementById('submitBtn');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Please fill in all fields.'; return; }
  btn.disabled = true; btn.textContent = '...';
  try {
    if (mode === 'signup') {
      if (pass.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; btn.disabled = false; btn.textContent = 'Create Account'; return; }
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      if (name) await updateProfile(cred.user, { displayName: name });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
    window.location.href = 'dashboard.html';
  } catch (e) {
    const msgs = {
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password. Try again.',
      'auth/invalid-credential': 'Incorrect email or password.',
      'auth/email-already-in-use': 'Email already registered. Try logging in.',
      'auth/invalid-email': 'Invalid email address.',
      'auth/too-many-requests': 'Too many attempts. Please try again later.',
      'auth/network-request-failed': 'Network error. Check your connection.'
    };
    errEl.textContent = msgs[e.code] || 'Error: ' + e.message;
    btn.disabled = false;
    btn.textContent = mode === 'login' ? 'Login' : 'Create Account';
  }
};

window.doGoogle = async () => {
  const errEl = document.getElementById('errorMsg');
  errEl.textContent = '';
  try {
    await signInWithPopup(auth, gProvider);
    window.location.href = 'dashboard.html';
  } catch (e) {
    if (e.code === 'auth/popup-closed-by-user') return;
    errEl.textContent = 'Google sign-in failed. Try email instead.';
  }
};
</script>
</body>
</html>
