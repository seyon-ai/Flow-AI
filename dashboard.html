<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowAI — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#06090f; --surface:#0c1018; --surface2:#111822; --surface3:#161f2e;
  --border:#1a2740; --accent:#00c8ff; --accent2:#6c4fff;
  --green:#00e5a0; --orange:#ff6b35; --yellow:#ffc947; --red:#ff4560;
  --text:#ddeeff; --muted:#4a6080; --fh:'Syne',sans-serif; --fm:'Space Mono',monospace;
}
body { background:var(--bg); color:var(--text); font-family:var(--fm); min-height:100vh; }
body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(0,200,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.02) 1px,transparent 1px); background-size:48px 48px; pointer-events:none; z-index:0; }

/* NAV */
nav { position:sticky; top:0; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:12px 32px; border-bottom:1px solid var(--border); background:rgba(6,9,15,0.97); backdrop-filter:blur(12px); }
.logo { font-family:var(--fh); font-size:18px; font-weight:800; display:flex; align-items:center; gap:10px; cursor:pointer; }
.logo-icon { width:28px; height:28px; border-radius:7px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:14px; }
.logo span { color:var(--accent); }
.nav-right { display:flex; align-items:center; gap:10px; }
.nav-btn { font-family:var(--fm); font-size:11px; padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.2s; }
.nav-btn:hover { border-color:var(--accent); color:var(--accent); }
.nav-btn.primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#06090f; border:none; font-family:var(--fh); font-weight:700; }
.nav-btn.primary:hover { filter:brightness(1.08); transform:translateY(-1px); }
.user-pill { display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:5px 12px; font-size:11px; cursor:pointer; transition:all 0.2s; }
.user-pill:hover { border-color:var(--red); color:var(--red); }
.avatar { width:22px; height:22px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#06090f; }

/* PAGE */
.page { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:48px 32px; }

.page-header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:40px; }
.page-title { font-family:var(--fh); font-size:32px; font-weight:800; line-height:1.1; }
.page-title span { color:var(--accent); }
.page-sub { font-size:12px; color:var(--muted); margin-top:8px; }

/* STATS ROW */
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:40px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; position:relative; overflow:hidden; animation:fadeUp 0.4s ease both; }
.stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
.stat-card:nth-child(1)::before { background:linear-gradient(90deg,var(--accent),transparent); }
.stat-card:nth-child(2)::before { background:linear-gradient(90deg,var(--green),transparent); }
.stat-card:nth-child(3)::before { background:linear-gradient(90deg,var(--accent2),transparent); }
.stat-card:nth-child(2) { animation-delay:0.1s; }
.stat-card:nth-child(3) { animation-delay:0.2s; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.stat-label { font-size:10px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; }
.stat-val { font-family:var(--fh); font-size:36px; font-weight:800; }
.stat-card:nth-child(1) .stat-val { color:var(--accent); }
.stat-card:nth-child(2) .stat-val { color:var(--green); }
.stat-card:nth-child(3) .stat-val { color:#a78bfa; }

/* GRID */
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.section-title { font-family:var(--fh); font-size:14px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }

.wf-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }

.wf-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; cursor:pointer; transition:all 0.25s; animation:fadeUp 0.4s ease both; position:relative; overflow:hidden; }
.wf-card::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(0,200,255,0.03),transparent); opacity:0; transition:opacity 0.25s; }
.wf-card:hover { border-color:rgba(0,200,255,0.35); transform:translateY(-2px); box-shadow:0 12px 32px rgba(0,0,0,0.3); }
.wf-card:hover::after { opacity:1; }
.wf-card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; }
.wf-icon { width:40px; height:40px; border-radius:10px; background:linear-gradient(135deg,rgba(0,200,255,0.15),rgba(108,79,255,0.15)); border:1px solid rgba(0,200,255,0.15); display:flex; align-items:center; justify-content:center; font-size:18px; }
.wf-menu { font-size:11px; color:var(--muted); padding:4px 8px; border-radius:6px; border:1px solid transparent; cursor:pointer; transition:all 0.2s; }
.wf-menu:hover { border-color:var(--red); color:var(--red); }
.wf-title { font-family:var(--fh); font-size:15px; font-weight:700; margin-bottom:6px; line-height:1.3; }
.wf-desc { font-size:11px; color:var(--muted); line-height:1.6; margin-bottom:16px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.wf-footer { display:flex; align-items:center; justify-content:space-between; }
.wf-badge { font-size:9px; letter-spacing:1px; text-transform:uppercase; padding:3px 10px; border-radius:20px; background:rgba(0,200,255,0.1); border:1px solid rgba(0,200,255,0.2); color:var(--accent); }
.wf-date { font-size:10px; color:var(--muted); }

/* EMPTY */
.empty-state { text-align:center; padding:80px 20px; }
.empty-icon { font-size:56px; opacity:0.15; margin-bottom:20px; }
.empty-title { font-family:var(--fh); font-size:20px; font-weight:700; margin-bottom:10px; color:var(--muted); }
.empty-sub { font-size:12px; color:var(--muted); line-height:1.7; margin-bottom:28px; }

/* LOADING */
.skeleton { background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.toast { position:fixed; bottom:24px; right:24px; z-index:9999; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 20px; font-size:12px; color:var(--text); animation:fadeUp 0.3s ease; box-shadow:0 8px 32px rgba(0,0,0,0.4); }

/* confirm modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:32px; width:360px; text-align:center; display:flex; flex-direction:column; gap:16px; }
.modal h3 { font-family:var(--fh); font-size:18px; font-weight:700; }
.modal p { font-size:12px; color:var(--muted); line-height:1.6; }
.modal-btns { display:flex; gap:10px; }
.modal-btns button { flex:1; padding:11px; border-radius:10px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:var(--fm); font-size:12px; cursor:pointer; transition:all 0.2s; }
.modal-btns .del-btn { border-color:rgba(255,69,96,0.4); color:var(--red); }
.modal-btns .del-btn:hover { background:rgba(255,69,96,0.1); }
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="location.href='dashboard.html'">
    <div class="logo-icon">⚡</div>
    Flow<span>AI</span>
  </div>
  <div class="nav-right">
    <button class="nav-btn" onclick="location.href='builder.html'">Builder</button>
    <div class="user-pill" onclick="doLogout()">
      <div class="avatar" id="userAvatar">?</div>
      <span id="userName">...</span>
      <span style="color:var(--muted);font-size:10px">· logout</span>
    </div>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">My <span>Workflows</span></div>
      <div class="page-sub">All your saved automations in one place.</div>
    </div>
    <button class="nav-btn primary" onclick="location.href='builder.html'">+ New Workflow</button>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total Workflows</div><div class="stat-val" id="totalCount">—</div></div>
    <div class="stat-card"><div class="stat-label">Total Nodes</div><div class="stat-val" id="totalNodes">—</div></div>
    <div class="stat-card"><div class="stat-label">AI Model</div><div class="stat-val" style="font-size:20px;margin-top:4px">Gemini</div></div>
  </div>

  <div class="section-header">
    <div class="section-title">Saved Automations</div>
    <div style="font-size:10px;color:var(--muted)" id="refreshHint"></div>
  </div>

  <div class="wf-grid" id="wfGrid">
    <!-- skeletons while loading -->
    <div class="wf-card"><div class="skeleton" style="height:40px;width:40px;border-radius:10px;margin-bottom:14px"></div><div class="skeleton" style="height:16px;width:70%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:100%;margin-bottom:4px"></div><div class="skeleton" style="height:12px;width:80%"></div></div>
    <div class="wf-card"><div class="skeleton" style="height:40px;width:40px;border-radius:10px;margin-bottom:14px"></div><div class="skeleton" style="height:16px;width:60%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:100%;margin-bottom:4px"></div><div class="skeleton" style="height:12px;width:85%"></div></div>
  </div>
</div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { collection, getDocs, query, where, doc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

let currentUser = null;
let workflows = [];
let deleteTargetId = null;

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'auth.html'; return; }
  currentUser = user;
  const name = user.displayName || user.email.split('@')[0];
  document.getElementById('userName').textContent = name;
  document.getElementById('userAvatar').textContent = name[0].toUpperCase();
  await loadWorkflows();
});

async function loadWorkflows() {
  try {
    // Only filter by uid — no orderBy — avoids composite index requirement
    const q = query(collection(db, 'workflows'), where('uid', '==', currentUser.uid));
    const snap = await getDocs(q);
    workflows = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Sort client-side by createdAt descending
    workflows.sort((a, b) => {
      const ta = a.createdAt?.seconds || 0;
      const tb = b.createdAt?.seconds || 0;
      return tb - ta;
    });
    renderGrid();
    renderStats();
  } catch (e) {
    console.error(e);
    showToast('❌ Failed to load workflows.');
  }
}

function renderStats() {
  document.getElementById('totalCount').textContent = workflows.length;
  const totalNodes = workflows.reduce((acc, w) => acc + (w.nodes?.length || 0), 0);
  document.getElementById('totalNodes').textContent = totalNodes;
}

const NODE_EMOJIS = { trigger:'⚡', action:'⚙', condition:'◆', output:'📤', delay:'⏱' };

function renderGrid() {
  const grid = document.getElementById('wfGrid');
  if (!workflows.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">◈</div>
        <div class="empty-title">No workflows yet</div>
        <p class="empty-sub">Head to the Builder and describe your first<br>automation in plain English.</p>
        <button class="nav-btn primary" onclick="location.href='builder.html'" style="margin:0 auto;display:inline-block;padding:12px 28px">+ Create First Workflow</button>
      </div>`;
    return;
  }

  grid.innerHTML = workflows.map((wf, idx) => {
    const firstNode = wf.nodes?.[0];
    const icon = firstNode?.icon || NODE_EMOJIS[firstNode?.type] || '⚡';
    const date = wf.createdAt?.seconds ? new Date(wf.createdAt.seconds * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'Recently';
    return `
      <div class="wf-card" style="animation-delay:${idx * 0.06}s" onclick="openWorkflow('${wf.id}')">
        <div class="wf-card-top">
          <div class="wf-icon">${icon}</div>
          <button class="wf-menu" onclick="event.stopPropagation();confirmDelete('${wf.id}')">✕ Delete</button>
        </div>
        <div class="wf-title">${wf.title || 'Untitled Workflow'}</div>
        <div class="wf-desc">${wf.summary || 'No description available.'}</div>
        <div class="wf-footer">
          <div class="wf-badge">${wf.nodes?.length || 0} nodes</div>
          <div class="wf-date">${date}</div>
        </div>
      </div>`;
  }).join('');
}

window.openWorkflow = (id) => {
  sessionStorage.setItem('loadWorkflowId', id);
  window.location.href = 'builder.html';
};

window.confirmDelete = (id) => {
  deleteTargetId = id;
  const modal = document.createElement('div');
  modal.className = 'modal-overlay'; modal.id = 'deleteModal';
  modal.innerHTML = `
    <div class="modal">
      <h3>Delete Workflow?</h3>
      <p>This action cannot be undone. The workflow will be permanently removed.</p>
      <div class="modal-btns">
        <button onclick="closeModal()">Cancel</button>
        <button class="del-btn" onclick="doDelete()">Delete</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
};

window.closeModal = () => document.getElementById('deleteModal')?.remove();

window.doDelete = async () => {
  closeModal();
  try {
    await deleteDoc(doc(db, 'workflows', deleteTargetId));
    workflows = workflows.filter(w => w.id !== deleteTargetId);
    renderGrid(); renderStats();
    showToast('🗑 Workflow deleted.');
  } catch (e) { showToast('❌ Delete failed.'); }
};

window.doLogout = async () => { await signOut(auth); window.location.href = 'auth.html'; };

function showToast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
}
</script>
</body>
</html>
